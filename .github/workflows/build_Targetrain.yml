name: Build and Release

on:
  push:
    tags:
      - "vTarget*"
    branches:
      - "**"
    paths:
      - "GFLH-TargetTrain/src/**"
      - "GFLH-TargetTrain/mk/**"
      - ".github/workflows/**"
  pull_request:
    branches:
      - "**"
    paths:
      - "GFLH-TargetTrain/src/**"
      - "GFLH-TargetTrain/mk/**"
      - ".github/workflows/**"
  workflow_dispatch:

# Set global permission to read-only
permissions:
  contents: read

jobs:
  build:
    name: Build Windows x86_64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r GFLH-TargetTrain/mk/requirements.txt

      - name: Build with PyInstaller
        shell: bash
        run: python GFLH-TargetTrain/mk/build.py

      - name: Prepare Artifact
        shell: bash
        run: |
              mkdir -p upload_stage
              cp -r GFLH-TargetTrain/dist/GFLH-TargetTrain "upload_stage/GFLH-Targettrain-win-x86_64"

      - name: Upload Artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: GFLH-Targettrain-win-x86_64
          path: upload_stage

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/vTarget')
    runs-on: ubuntu-latest
    # Only grant write permission to the specific job that needs to create a release
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3
        with:
          path: artifacts

      - name: Zip Artifacts
        run: |
          mkdir -p release_assets
          cd artifacts
          for dir in */; do
            dir=${dir%*/}
            zip_name="${dir}.zip"
            (cd "$dir" && zip -r "../../release_assets/$zip_name" .)
          done

      - name: Create Release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda
        with:
          files: release_assets/*
          draft: false
          prerelease: false
          generate_release_notes: true
